name: Release container image

on:
  release:
    types: [published]

permissions: read-all

jobs:
  build-and-push:
    name: Build and push container image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Extract version tags
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          MAJOR=$(echo "$TAG" | grep -oE '^v[0-9]+')
          echo "major=${MAJOR}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.version.outputs.tag }}
          tags: |
            quay.io/bapalm/go-quay:${{ steps.version.outputs.tag }}
            quay.io/bapalm/go-quay:${{ steps.version.outputs.major }}
            quay.io/bapalm/go-quay:latest
